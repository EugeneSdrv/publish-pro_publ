networks:
  app-network:
    driver: bridge

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: app:v0.0.1
    restart: always
    env_file:
      .env
    environment:
      POSTGRES_HOST: "${DB_HOST}"
    command:
      - sh
      - -c
      - >
        alembic upgrade head &&
        uv run fastapi dev app/main.py --host ${PUB_API_HOST} --port ${PUB_API_PORT} &
        celery -A app.tasks.task.celery_app worker --loglevel=info &
        celery -A app.tasks.task.celery_app beat --loglevel=info
    ports:
      - "${PUB_API_PORT}:${PUB_API_PORT}"
    depends_on:
        pg:
          condition: service_healthy
        minio:
          condition: service_started
    networks:
      - app-network

  frontend:
    build:
      context: ../publish-pro-front
      dockerfile: Dockerfile
    environment:
      INTERNAL_API_BASE_URL: "${INTERNAL_API_BASE_URL}"
      NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL}"
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL}"
    depends_on:
      - backend
    networks:
      - app-network

  pg:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_NAME}"
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASS}"
      PGPORT: "${DB_PORT}"
    volumes:
      - ./_data/pg/data:/var/lib/postgresql/18/docker
    ports:
      - "${DB_PORT}:${DB_PORT}"
    expose:
      - "${DB_PORT}"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -p ${DB_PORT}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    environment:
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASS: ${REDIS_PASS}
      REDIS_USER: ${REDIS_USER}
    expose:
      - "${REDIS_PORT}"
    command: >
      redis-server
      --port ${REDIS_PORT}
      --requirepass ${REDIS_PASS}
      --user ${REDIS_USER} "${REDIS_PASS}"
      --appendonly no
      --save ""
      --maxmemory 1024mb
      --maxmemory-policy allkeys-lru
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    ports:
      - "${MINIO_PORT}:${MINIO_PORT}"
      - "${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_PORT}"
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY}"
    volumes:
      - ./_data/s3/data:/data
    command: server --console-address ":${MINIO_CONSOLE_PORT}" /data
    networks:
      - app-network

  caddy:
    image: caddy:2.11
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./_data/caddy_data:/data
      - ./_data/caddy_config:/config
    networks:
      - app-network
